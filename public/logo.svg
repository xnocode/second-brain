<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 140 140">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="40%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A67C00"/>
      <stop offset="100%" stop-color="#C5A55A"/>
    </linearGradient>
    <linearGradient id="elec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5CC"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="elecGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="blur" operator="over"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="spark">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="140" height="140" rx="24" fill="#050505"/>

  <!-- Electric field haze -->
  <circle cx="70" cy="75" r="52" fill="none" stroke="#D4A017" stroke-width="0.5" opacity="0.08"/>
  <circle cx="70" cy="75" r="44" fill="none" stroke="#D4A017" stroke-width="0.3" opacity="0.05"/>

  <!-- Outer triangle - thick -->
  <polygon points="70,18 122,112 18,112" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Inner triangle -->
  <polygon points="70,40 104,100 36,100" fill="none" stroke="url(#goldInner)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.35"/>

  <!-- Inner fill -->
  <polygon points="70,58 90,90 50,90" fill="url(#gold)" opacity="0.08"/>

  <!-- Electric arc - left side -->
  <polyline points="38,100 42,88 36,78 44,68 40,56" fill="none" stroke="url(#elec)" stroke-width="1.5" stroke-linecap="round" filter="url(#elecGlow)" opacity="0.7"/>

  <!-- Electric arc - right side -->
  <polyline points="102,100 98,86 104,76 96,66 100,54" fill="none" stroke="url(#elec)" stroke-width="1.5" stroke-linecap="round" filter="url(#elecGlow)" opacity="0.7"/>

  <!-- Electric arc - bottom -->
  <polyline points="40,108 52,104 60,110 70,106 80,111 88,105 100,108" fill="none" stroke="url(#elec)" stroke-width="1.2" stroke-linecap="round" filter="url(#elecGlow)" opacity="0.5"/>

  <!-- Lightning bolt - center -->
  <polyline points="70,48 64,68 72,66 66,84" fill="none" stroke="#FFE066" stroke-width="2" stroke-linejoin="bevel" stroke-linecap="round" filter="url(#elecGlow)" opacity="0.9"/>

  <!-- Sparks -->
  <circle cx="38" cy="78" r="2" fill="#FFE066" filter="url(#spark)" opacity="0.8"/>
  <circle cx="102" cy="76" r="1.8" fill="#FFE066" filter="url(#spark)" opacity="0.75"/>
  <circle cx="64" cy="68" r="1.5" fill="#FFF5CC" filter="url(#spark)" opacity="0.9"/>
  <circle cx="44" cy="88" r="1.2" fill="#D4A017" filter="url(#spark)" opacity="0.6"/>
  <circle cx="96" cy="86" r="1.3" fill="#D4A017" filter="url(#spark)" opacity="0.6"/>
  <circle cx="52" cy="104" r="1" fill="#FFE066" filter="url(#spark)" opacity="0.5"/>
  <circle cx="88" cy="105" r="1" fill="#FFE066" filter="url(#spark)" opacity="0.5"/>

  <!-- Tiny scatter sparks -->
  <circle cx="30" cy="65" r="0.8" fill="#D4A017" opacity="0.4"/>
  <circle cx="110" cy="62" r="0.7" fill="#D4A017" opacity="0.35"/>
  <circle cx="48" cy="52" r="0.6" fill="#FFE066" opacity="0.3"/>
  <circle cx="92" cy="50" r="0.6" fill="#FFE066" opacity="0.3"/>
  <circle cx="70" cy="112" r="0.8" fill="#C5A55A" opacity="0.4"/>

  <!-- Center energy dot -->
  <circle cx="68" cy="74" r="4" fill="#D4A017" opacity="0.2"/>
  <circle cx="68" cy="74" r="2.5" fill="#FFE066" filter="url(#elecGlow)" opacity="0.9"/>
</svg>